<link rel="stylesheet" href="../style.css">
<style>

.view-seg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.vbtn{padding:10px 16px;border:3px solid var(--ink);background:#fff;color:var(--ink);
  font-size:15px;font-weight:800;box-shadow:3px 3px 0 var(--lilac);transition:var(--transition)}
body.dark .vbtn{background:#31215c;color:#f4ecff}
.vbtn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--magenta)}
.vbtn.active{background:var(--magenta);color:#fff;box-shadow:3px 3px 0 var(--ink)}
.cal-header{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
.cal-nav{width:38px;height:38px;border:3px solid var(--ink);background:var(--gold);color:var(--ink);
  font-size:19px;font-weight:800;box-shadow:2px 2px 0 var(--magenta)}
.cal-title{font-family:var(--f-serif);font-weight:900;font-size:20px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-family:var(--f-mono);font-size:12.5px;font-weight:800;
  color:#fff;background:var(--ink);padding:5px 0}
.cal-cell{position:relative;min-height:82px;border:3px solid var(--ink);background:#fff;padding:5px 4px}
body.dark .cal-cell{background:#31215c}
.cal-cell.other{opacity:.32}
.cal-cell.has{cursor:pointer}
.cal-cell.has:hover{background:var(--lilac)}
.cal-cell.today{box-shadow:inset 0 0 0 3px var(--magenta)}
.cal-cell.hl{background:var(--gold)}
.cal-date{display:block;font-family:var(--f-mono);font-size:13px;font-weight:800;margin-bottom:3px}
.ev{display:block;font-size:12.5px;font-weight:800;padding:1px 5px;margin-top:3px;
  border:2px solid var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-green{background:#bff0d8;color:#12472f}
.c-pink{background:#ffc6e4;color:#7a1350}
.c-yellow{background:#ffe6a8;color:#6b4a00}
.c-orange{background:#ffd0ac;color:#7a3808}
.c-blue{background:#bcdcff;color:#123f70}
.c-purple{background:#dcc6ff;color:#3c1b73}
.c-red{background:#ffc2c2;color:#7a1212}
.c-gray{background:#e2e2e6;color:#3a3a3a}

/* 주간 뷰 — 요일 7칸은 모바일에서도 유지 */
.week-head{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wcell{border:3px solid var(--ink);background:#fff;padding:8px 4px;min-height:120px;display:flex;
  flex-direction:column;gap:4px;text-align:center}
body.dark .wcell{background:#31215c}
.wcell.today{box-shadow:inset 0 0 0 3px var(--magenta)}
.wcell.has{cursor:pointer}
.wcell .wd{font-family:var(--f-mono);font-size:13px;font-weight:800;color:var(--main-dark)}
.wcell .wn{font-family:var(--f-mono);font-size:16px;font-weight:800}
.wcell.off-day{background:var(--ink);color:#fff}
.wcell.off-day .wd{color:var(--pink)}

/* 다가오는 일정 */
.up-item{display:grid;grid-template-columns:118px 1fr auto;align-items:center;gap:10px;
  border:3px solid var(--ink);background:#fff;padding:11px 13px;margin-bottom:9px;cursor:pointer;
  box-shadow:3px 3px 0 var(--lilac);transition:var(--transition)}
body.dark .up-item{background:#31215c}
.up-item:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--magenta)}
.up-d1{font-family:var(--f-mono);font-size:14px;font-weight:800;color:var(--main-dark)}
.up-title{font-size:15.5px;font-weight:800}
.up-time{font-family:var(--f-mono);font-size:13px;color:var(--text-soft)}
.up-badge{font-size:12.5px;font-weight:800;border:2px solid var(--ink);padding:1px 9px;white-space:nowrap}

/* 상세 모달 */
.ov{position:fixed;inset:0;background:rgba(20,10,41,.75);display:none;place-items:center;z-index:205;padding:20px}
.ov.show{display:grid}
.ov .modal{background:var(--cream);border:5px solid var(--ink);box-shadow:10px 10px 0 var(--magenta);
  padding:22px;width:100%;max-width:400px}
.m-date{font-family:var(--f-mono);font-size:14px;font-weight:800;color:var(--magenta);margin-bottom:8px}
.m-badge{display:inline-block;font-size:13px;font-weight:800;border:2px solid var(--ink);padding:1px 10px;margin-bottom:8px}
.m-part{display:grid;grid-template-columns:82px 1fr;gap:9px;border:3px solid var(--ink);background:#fff;
  padding:9px 11px;margin-bottom:7px}
body.dark .m-part{background:#31215c}
.m-part .pt{font-family:var(--f-mono);font-size:13.5px;font-weight:800;color:var(--main-dark)}
.m-part .pn{font-size:15px;font-weight:700}
.m-desc{font-size:14.5px;color:var(--text-soft);line-height:1.7;margin:6px 0 4px;white-space:pre-wrap}
.m-close{width:100%;margin-top:10px;padding:11px;font-size:15px;font-weight:800;
  border:3px solid var(--ink);background:var(--magenta);color:#fff}
@media(max-width:560px){
  .cal-cell{min-height:62px;padding:3px 2px}
  .cal-grid{gap:3px}
  .ev{font-size:12.5px;padding:0 3px}
  .cal-date{font-size:12.5px}
  .week-row{gap:3px}
  .wcell{padding:6px 2px;min-height:100px}
  .up-item{grid-template-columns:1fr;gap:5px;text-align:left}
}

</style>
</head>

<script>
function toggleDark(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
  syncKnob();
}
function syncKnob(){
  var d=document.body.classList.contains('dark');
  document.querySelectorAll('.dk .knob').forEach(function(i){i.textContent=d?'☀':'☾'});
}
syncKnob();
function openAsk(){document.getElementById('askmask').classList.add('on')}
function closeAsk(){document.getElementById('askmask').classList.remove('on')}
async function sendAsk(){
  var t=document.getElementById('askmsg').value.trim();
  if(!t){alert('내용을 입력해 주세요!');return}
  var nick=document.getElementById('askNick').value.trim();
  var ok=false;
  try{ ok = await insertRow('inquiries',{ nickname:nick||null, message:t }); }catch(e){ ok=false; }
  if(ok){ alert('문의가 전송되었습니다! 💜');
    document.getElementById('askmsg').value=''; document.getElementById('askNick').value=''; closeAsk(); }
  else  { alert('전송에 실패했어요. 잠시 후 다시 시도해 주세요.'); }
}
function ready(){ document.body.classList.add('ready'); }
setTimeout(ready,1600);   /* FOUC 폴백 — DB가 느리거나 오프라인이어도 화면은 뜬다 */

<script>
/* 아바타는 admin의 avatar > soop-id 순으로 (사이드바는 전 페이지 공통) */
(async function(){
  try{

    var p=(res&&res.data&&res.data.data)||{};
    var av=document.getElementById('avatar');
    if(p['avatar']) av.src=String(p['avatar']);
    else if(p['soop-id']){ var id=String(p['soop-id']);
      av.src='https://profile.img.sooplive.co.kr/LOGO/'+id.slice(0,2)+'/'+id+'/'+id+'.jpg'; }
  }catch(e){}
})();
</script>
<script>

var DAYS=['일','월','화','수','목','금','토'];
var allSchedule=[], curYear, curMonth, weekStart, curView='week';
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function kind(t){ return t==='휴방' ? 'off' : 'on'; }
function colorClass(s){ return 'c-'+(s.color || (kind(s.type)==='off'?'pink':'green')); }
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function mondayOf(d){
  var x=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var w=(x.getDay()+6)%7;          /* 0=월 … 6=일 (프로젝트 전역 규칙) */
  x.setDate(x.getDate()-w); return x;
}

async function init(){
  var now=new Date();
  curYear=now.getFullYear(); curMonth=now.getMonth(); weekStart=mondayOf(now);
  try{ allSchedule = await fetchAll('schedule',{ order:'date', asc:true }) || []; }
  catch(e){ console.warn('schedule load failed:', e); allSchedule=[]; }
  document.querySelectorAll('#view-seg .vbtn').forEach(function(b){
    b.addEventListener('click', function(){
      curView=b.dataset.view;
      document.querySelectorAll('#view-seg .vbtn').forEach(function(x){ x.classList.toggle('active', x.dataset.view===curView); });
      document.getElementById('v-week').style.display  = curView==='week' ?'':'none';
      document.getElementById('v-month').style.display = curView==='month'?'':'none';
      document.getElementById('v-up').style.display    = curView==='up'   ?'':'none';
    });
  });
  renderWeek(); renderCalendar(); renderUpcoming();
  try{ if(typeof initIframeResize==='function') initIframeResize(); }catch(e){}
  ready();
}

/* ── 주간 ── */
function changeWeek(d){ weekStart.setDate(weekStart.getDate()+d*7); renderWeek(); }
function renderWeek(){
  var end=new Date(weekStart); end.setDate(end.getDate()+6);
  document.getElementById('weekTitle').textContent =
    (weekStart.getMonth()+1)+'.'+weekStart.getDate()+' ~ '+(end.getMonth()+1)+'.'+end.getDate();
  var today=ymd(new Date()), html='';
  for(var i=0;i<7;i++){
    var d=new Date(weekStart); d.setDate(d.getDate()+i);
    var ds=ymd(d);
    var evs=allSchedule.filter(function(s){ return s.date===ds; });
    var offAll = evs.length>0 && evs.every(function(e){ return kind(e.type)==='off'; });
    var body=evs.map(function(e){
      var label=(e.time?e.time+' ':'')+(e.title||(kind(e.type)==='off'?'휴방':'방송'));
      return '<span class="ev '+colorClass(e)+'">'+esc(label)+'</span>';
    }).join('');
    html+='<div class="wcell'+(ds===today?' today':'')+(evs.length?' has':'')+(offAll?' off-day':'')+'"'+
      (evs.length?' onclick="openModal(\''+ds+'\')"':'')+'>'+
      '<div class="wd">'+DAYS[d.getDay()]+'</div><div class="wn">'+d.getDate()+'</div>'+body+'</div>';
  }
  document.getElementById('weekRow').innerHTML=html;
}

/* ── 월간 ── */
function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){ curMonth=0; curYear++; }
  if(curMonth<0){ curMonth=11; curYear--; }
  renderCalendar();
}
function renderCalendar(){
  document.getElementById('calTitle').textContent=curYear+'년 '+(curMonth+1)+'월';
  var first=new Date(curYear,curMonth,1), last=new Date(curYear,curMonth+1,0);
  var startDay=first.getDay(), today=new Date();
  var html=DAYS.map(function(d){ return '<div class="cal-dow">'+d+'</div>'; }).join('');
  var prevLast=new Date(curYear,curMonth,0).getDate();
  for(var i=startDay-1;i>=0;i--) html+='<div class="cal-cell other"><span class="cal-date">'+(prevLast-i)+'</span></div>';
  for(var d=1;d<=last.getDate();d++){
    var ds=curYear+'-'+String(curMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    var evs=allSchedule.filter(function(s){ return s.date===ds; });
    var hl=evs.some(function(e){ return e.highlight; });
    var evHtml=evs.map(function(e){
      var label=(e.time?e.time+' ':'')+(e.title||(kind(e.type)==='off'?'휴방':'방송'));
      return '<span class="ev '+colorClass(e)+'" title="'+esc(label)+'">'+esc(label)+'</span>';
    }).join('');
    html+='<div class="cal-cell'+(isToday?' today':'')+(evs.length?' has':'')+(hl?' hl':'')+'"'+
      (evs.length?' onclick="openModal(\''+ds+'\')"':'')+'>'+
      '<span class="cal-date">'+d+'</span>'+evHtml+'</div>';
  }
  var totalCells=startDay+last.getDate();
  var rem=totalCells%7===0?0:7-(totalCells%7);
  for(var j=1;j<=rem;j++) html+='<div class="cal-cell other"><span class="cal-date">'+j+'</span></div>';
  document.getElementById('calGrid').innerHTML=html;
}

/* ── 다가오는 ── */
function renderUpcoming(){
  var today=ymd(new Date());
  var up=allSchedule.filter(function(s){ return s.date>=today; }).slice(0,12);
  var el=document.getElementById('upcoming');
  if(!up.length){ el.innerHTML='<div class="empty"><span class="empty-icon">▷</span>다가오는 일정이 없어요</div>'; return; }
  el.innerHTML=up.map(function(s){
    var dd=new Date(s.date+'T00:00:00'), k=kind(s.type);
    var label=k==='off'?'휴방':'방송';
    var times=[s.time,s.time2].filter(Boolean).join(' · ');
    return '<div class="up-item" onclick="openModal(\''+s.date+'\')">'+
      '<div class="up-date"><div class="up-d1">'+String(dd.getMonth()+1).padStart(2,'0')+'-'+
      String(dd.getDate()).padStart(2,'0')+' ('+DAYS[dd.getDay()]+')</div></div>'+
      '<div class="up-info"><div class="up-title">'+esc(s.title||label)+'</div>'+
      (times?'<div class="up-time">'+esc(times)+'</div>':'')+'</div>'+
      '<span class="up-badge '+colorClass(s)+'">'+label+'</span></div>';
  }).join('');
}

/* ── 상세 모달 ── */
function openModal(ds){
  var evs=allSchedule.filter(function(s){ return s.date===ds; });
  if(!evs.length) return;
  var dd=new Date(ds+'T00:00:00');
  var html='<div class="m-date">'+ds+' ('+DAYS[dd.getDay()]+')</div>';
  evs.forEach(function(s){
    var k=kind(s.type);
    html+='<div class="m-badge '+colorClass(s)+'">'+(k==='off'?'휴방':'방송')+'</div>';
    html+='<div class="m-part"><div class="pt">'+(s.time?esc(s.time):'1부')+'</div>'+
          '<div class="pn">'+esc(s.title||(k==='off'?'휴방':'방송'))+'</div></div>';
    if(s.title2||s.time2){
      html+='<div class="m-part"><div class="pt">'+(s.time2?esc(s.time2):'2부')+'</div>'+
            '<div class="pn">'+esc(s.title2||'방송')+'</div></div>';
    }
    if(s.description) html+='<div class="m-desc">'+esc(s.description)+'</div>';
  });
  html+='<button class="m-close" onclick="closeModal()">닫기</button>';
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('ov').classList.add('show');
}
function closeModal(){ document.getElementById('ov').classList.remove('show'); }
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });
init();

</script>

(function(){
  if(typeof window.fxHearts==='function')return;
  var SH=['✧','✦','♡','✧','☾','✦'],fx=document.getElementById('fx');

    s.className='fxfb';s.textContent=SH[i%SH.length];
    s.style.left=(Math.random()*100)+'%';
    s.style.top=(100+Math.random()*40)+'%';
    s.style.animationDuration=(9+Math.random()*9)+'s';
    s.style.animationDelay=(Math.random()*9)+'s';
    s.style.fontSize=(12+Math.random()*14)+'px';
    fx.appendChild(s);
  }
})();
